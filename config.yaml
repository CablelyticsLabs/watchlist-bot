# ============================================================
#  @VisionariesOnly Watchlist Bot — Config v3
#  24/7 continuous scanner + 9:30 AM ET daily post
# ============================================================

discord:
  webhook_url: "YOUR_DISCORD_WEBHOOK_URL_HERE"
  username: "@VisionariesOnly Watchlist Bot"
  mention: ""
  avatar_url: ""

framework:
  url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZfT-zalg1VjkCuyBz95Hw7k1FafUDmP7dwVe3ME3wnL9jKK-C6ZWgbqTD89Otqg/pub?output=csv"

schedule:
  post_time: "09:30"
  timezone: "America/New_York"

# ── UNIVERSE ─────────────────────────────────────────────────
# The dynamic universe is built from:
#   - S&P 500 (~500)        pulled from Wikipedia each run
#   - NASDAQ 100 (~100)     pulled from Wikipedia each run
#   - Russell 1000 (~1000)  pulled from iShares ETF each run
#   - mainstream list below (catches any tickers not in indexes)
#   - yfinance screeners    (trending/momentum tickers)
# Total: ~1,200–1,500 unique tickers

universe:

  # Supplements the index pulls — any tickers not already covered
  mainstream:
    - NVDA
    - MSFT
    - GOOGL
    - AMZN
    - META
    - AAPL
    - TSM
    - AVGO
    - AMD
    - PLTR
    - CRWD
    - SNOW
    - DDOG
    - NET
    - SMCI
    - ARM
    - CRM
    - ORCL
    - SHOP
    - UBER
    - PANW
    - ZS
    - NOW
    - ADBE
    - MDB
    - COIN
    - MSTR
    - LLY
    - NVO
    - ISRG

  # Hidden gems are discovered DYNAMICALLY — not a static list.
  # A stock qualifies as a hidden gem if ALL THREE are true:
  #   1. It's in the Russell 1000 but NOT in the S&P 500 or NASDAQ 100
  #      (smaller, less-covered stocks)
  #   2. It scores >= gem_min_score on the framework
  #      (genuinely good fundamentals)
  #   3. It has < gem_max_social_mentions in the last 24 hours
  #      (not yet on everyone's radar)
  gem_min_score: 65
  gem_max_social_mentions: 5

  auto_discover: true
  auto_discover_count: 30
  min_avg_volume: 100000
  min_market_cap: 50000000

# ── WEIGHTS ──────────────────────────────────────────────────
weights:
  leadership_team: 0.12
  product_market_fit: 0.18
  macro_environment: 0.12
  financial_health: 0.16
  narrative_adoption: 0.14
  technicals_entry: 0.20
  governance_stability: 0.08

# ── TECHNICALS ───────────────────────────────────────────────
technicals:
  ema_periods: [20, 50, 200]
  rsi_period: 14
  rsi_oversold: 40
  rsi_overbought: 75
  volume_surge_ratio: 1.5
  max_pct_from_52w_high: 0.60
  min_pct_from_52w_high: 0.01

# ── SENTIMENT ────────────────────────────────────────────────
sentiment:
  enabled: true
  sources:
    - reddit_wsb
    - reddit_stocks
    - reddit_investing
    - news_headlines
  lookback_hours: 24
  min_mentions_threshold: 2

# ── FUNDAMENTALS ─────────────────────────────────────────────
fundamentals:
  max_pe_ratio: 300
  min_revenue_growth_yoy: 0.0
  max_debt_to_equity: 10.0
  min_gross_margin: 0.0

# ── OUTPUT ───────────────────────────────────────────────────
output:
  top_n_mainstream: 5
  top_n_hidden_gems: 5
  save_json: true
  log_level: "INFO"

# ── API KEYS ─────────────────────────────────────────────────
api_keys:
  anthropic_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"
  reddit_client_id: "YOUR_REDDIT_CLIENT_ID"
  reddit_client_secret: "YOUR_REDDIT_CLIENT_SECRET"
  reddit_user_agent: "VisionariesOnlyBot/3.0"
  news_api_key: "YOUR_NEWSAPI_KEY_HERE"
