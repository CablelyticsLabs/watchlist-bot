name: 📈 VisionariesOnly Watchlist Bot

on:
  schedule:
    # 11:30 AM UTC = 6:30 AM ET
    # Scans 1,000+ stocks over ~2.5-3 hours
    # Finishes and posts to Discord around 9:00-9:30 AM ET
    - cron: "30 11 * * 1-5"   # Mon–Fri only

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print to console, skip Discord post"
        required: false
        default: false
        type: boolean
      limit:
        description: "Limit scan to N tickers (leave blank for full universe)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  scan-and-post:
    name: Full Universe Scan + Post
    runs-on: ubuntu-latest
    # 6 hours = max GitHub Actions free tier
    # Full 1,000+ stock scan takes ~2.5-3 hours
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject secrets into config
        env:
          DISCORD_WEBHOOK:      ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          FRAMEWORK_URL:        ${{ secrets.FRAMEWORK_URL }}
        run: |
          python - <<'EOF'
          import yaml, os
          with open("config.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg["discord"]["webhook_url"]           = os.environ.get("DISCORD_WEBHOOK", "")
          cfg["api_keys"]["anthropic_api_key"]    = os.environ.get("ANTHROPIC_API_KEY", "")
          cfg["api_keys"]["news_api_key"]         = os.environ.get("NEWS_API_KEY", "")
          cfg["api_keys"]["reddit_client_id"]     = os.environ.get("REDDIT_CLIENT_ID", "")
          cfg["api_keys"]["reddit_client_secret"] = os.environ.get("REDDIT_CLIENT_SECRET", "")
          url = os.environ.get("FRAMEWORK_URL", "")
          if url:
              cfg["framework"]["url"] = url
          with open("config.yaml", "w") as f:
              yaml.dump(cfg, f)
          print("✓ Secrets injected")
          EOF

      - name: Run full universe scan + post to Discord
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
          LIMIT:   ${{ github.event.inputs.limit }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Trigger  : ${{ github.event_name }}"
          echo "  Dry run  : $DRY_RUN"
          echo "  Limit    : ${LIMIT:-full universe}"
          echo "  Started  : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Build the command
          CMD="python bot.py"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          if [ -n "$LIMIT" ]; then
            CMD="$CMD --limit $LIMIT"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Commit output JSON to repo
        if: always()
        run: |
          git config user.name  "VisionariesOnly Bot"
          git config user.email "bot@visionariesonly"
          git add output/latest.json output/picks_*.json || true
          git diff --staged --quiet || git commit -m "chore: picks $(date -u '+%Y-%m-%d')"
          git push || echo "Nothing to push"

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-${{ github.run_id }}
          path: |
            output/
            logs/
          retention-days: 30

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python - <<'EOF'
          import requests, os
          w = os.environ.get("DISCORD_WEBHOOK", "")
          if w and len(w) > 10:
              requests.post(w, json={
                  "username": "@VisionariesOnly Watchlist Bot",
                  "embeds": [{
                      "title": "❌ Bot Run Failed",
                      "description": "The daily scan failed on GitHub Actions.\nCheck the Actions tab for logs.",
                      "color": 0xFF3333
                  }]
              }, timeout=10)
          EOF
